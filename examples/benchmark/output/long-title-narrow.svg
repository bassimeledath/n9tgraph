<text x="30" y="34" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">ADR-0042: Migration from monolithic PostgreSQL to event-sourced CQRS architecture with Apache Kafka</text><text x="30" y="55" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">as the backbone — approved by architecture review board on 2024-11-15, supersedes ADR-0031</text>
