<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 615 704" width="615" height="704">
<defs>
  <pattern id="dotgrid" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#000000"/>
    <circle cx="4" cy="4" r="0.8" fill="#b4f079" opacity="0.7"/>
  </pattern>
  <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#000000"/>
    <path d="M0 8L8 0M-1 1L1 -1M7 9L9 7" stroke="#b4f079" stroke-width="0.8" opacity="0.2"/>
  </pattern>
  <pattern id="hero" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="#3d6b23"/>
    <circle cx="3" cy="3" r="0.6" fill="#5a9a35" opacity="0.5"/>
  </pattern>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
    <polygon points="0 0, 10 3.5, 0 7" fill="#b4f079"/>
  </marker>
  <marker id="arrowhead-reverse" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
    <polygon points="10 0, 0 3.5, 10 7" fill="#b4f079"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#000000"/>
<g class="diagram">
<text x="30" y="34" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">OAuth2 Login Flow</text><g class="lifelines"><line x1="118.5" y1="92" x2="118.5" y2="644" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="307.5" y1="92" x2="307.5" y2="644" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="496.5" y1="92" x2="496.5" y2="644" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/></g><g class="fragments"><rect x="80" y="490" width="455" height="126" rx="4" fill="none" stroke="#b4f079" stroke-width="1"/><rect x="80" y="490" width="40" height="22" fill="#b4f079" rx="2"/><text x="88" y="501" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#000000" dominant-baseline="central" font-weight="700" letter-spacing="0.08em">ALT</text><text x="130" y="501" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" dominant-baseline="central" letter-spacing="0.08em">token expired</text></g><g class="messages"><line x1="118.5" y1="116" x2="307.5" y2="116" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="108" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">GET /authorize</text><line x1="307.5" y1="150" x2="118.5" y2="150" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="142" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">login page</text><line x1="118.5" y1="184" x2="307.5" y2="184" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="176" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">credentials</text><line x1="307.5" y1="218" x2="118.5" y2="218" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="210" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">authorization code</text><line x1="118.5" y1="296" x2="307.5" y2="296" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="288" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">POST /token (code)</text><line x1="307.5" y1="330" x2="118.5" y2="330" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="322" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">access token + refresh token</text><line x1="118.5" y1="364" x2="496.5" y2="364" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="356" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">GET /api (Bearer token)</text><line x1="496.5" y1="398" x2="307.5" y2="398" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="315.5" y="390" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">validate token</text><line x1="307.5" y1="432" x2="496.5" y2="432" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="315.5" y="424" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">token valid</text><line x1="496.5" y1="466" x2="118.5" y2="466" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="458" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">protected data</text><line x1="118.5" y1="536" x2="307.5" y2="536" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="528" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">POST /token (refresh)</text><line x1="307.5" y1="570" x2="118.5" y2="570" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="126.5" y="562" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">new access token</text></g><g class="notes"><text x="59.099999999999994" y="258" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ffffff" text-anchor="start" dominant-baseline="central">redirect with code</text></g><g class="participants"><rect x="69.5" y="50" width="98" height="42" rx="12" fill="transparent" stroke="#b4f079" stroke-width="1.5"/><text x="118.5" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">BROWSER</text><rect x="240" y="50" width="135" height="42" rx="12" fill="url(#hero)" stroke="#b4f079" stroke-width="1.5"/><text x="307.5" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">AUTH SERVER</text><rect x="410" y="50" width="173" height="42" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="496.5" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">RESOURCE SERVER</text><rect x="69.5" y="644" width="98" height="42" rx="12" fill="transparent" stroke="#b4f079" stroke-width="1.5"/><text x="118.5" y="665" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">BROWSER</text><rect x="240" y="644" width="135" height="42" rx="12" fill="url(#hero)" stroke="#b4f079" stroke-width="1.5"/><text x="307.5" y="665" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">AUTH SERVER</text><rect x="410" y="644" width="173" height="42" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="496.5" y="665" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">RESOURCE SERVER</text></g>
</g>
