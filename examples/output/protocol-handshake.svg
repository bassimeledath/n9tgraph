    <polygon points="10 0, 0 3.5, 10 7" fill="#b4f079"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#000000"/>
<g class="diagram">
<text x="30" y="34" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">WebSocket upgrade with subprotocol negotiation and keepalive</text><g class="lifelines"><line x1="128" y1="92" x2="128" y2="856" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="336" y1="92" x2="336" y2="856" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="544" y1="92" x2="544" y2="856" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="752" y1="92" x2="752" y2="856" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="960" y1="92" x2="960" y2="856" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/></g><g class="fragments"><rect x="89.5" y="476" width="909" height="134" rx="4" fill="none" stroke="#b4f079" stroke-width="1"/><rect x="89.5" y="476" width="48" height="22" fill="#b4f079" rx="2"/><text x="97.5" y="487" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#000000" dominant-baseline="central" font-weight="700" letter-spacing="0.08em">LOOP</text><text x="147.5" y="487" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" dominant-baseline="central" letter-spacing="0.08em">KEEPALIVE (every 30s)</text><rect x="89.5" y="610" width="909" height="174" rx="4" fill="none" stroke="#b4f079" stroke-width="1"/><rect x="89.5" y="610" width="40" height="22" fill="#b4f079" rx="2"/><text x="97.5" y="621" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#000000" dominant-baseline="central" font-weight="700" letter-spacing="0.08em">ALT</text><text x="139.5" y="621" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" dominant-baseline="central" letter-spacing="0.08em">CONNECTION_CLOSE</text></g><g class="messages"><line x1="128" y1="116" x2="336" y2="116" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="108" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">GET /ws HTTP/1.1\nUpgrade: websocket\nConnection: Upgrade\nSec-WebSocket-Key: dGhlIHNhbXBsZQ==\nSec-WebSocket-Protocol: graphql-ws, json-rpc\nSec-WebSocket-Version: 13</text><line x1="336" y1="150" x2="544" y2="150" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="142" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Forward upgrade request with X-Forwarded-For and X-Real-IP headers</text><line x1="544" y1="184" x2="752" y2="184" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="176" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Validate bearer token from cookie</text><text x="762" y="198" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Extract claims and verify audience</text><line x1="752" y1="224" x2="960" y2="224" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="760" y="216" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Check session not revoked</text><text x="970" y="238" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Lookup by session_id with TTL check</text><line x1="960" y1="264" x2="752" y2="264" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="760" y="256" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Session valid, last_active: 2024-11-15T10:30:00Z, ip_match: true</text><line x1="752" y1="298" x2="544" y2="298" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="290" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Claims: {sub: user_123, scope: [read, write], exp: 1700000000}</text><line x1="544" y1="332" x2="960" y2="332" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="324" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Create WS session entry</text><text x="970" y="346" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">ws_id: abc-123, protocol: graphql-ws</text><line x1="544" y1="372" x2="336" y2="372" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="364" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">HTTP/1.1 101 Switching Protocols\nUpgrade: websocket\nSec-WebSocket-Accept: s3pPLMBiTxaQ9kYGzzhZRbK+xOo=\nSec-WebSocket-Protocol: graphql-ws</text><line x1="336" y1="406" x2="128" y2="406" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="398" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">101 Switching Protocols</text><text x="346" y="420" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Connection upgraded to WebSocket</text><line x1="128" y1="446" x2="544" y2="446" stroke="#b4f079" stroke-width="1.5" marker-start="url(#arrowhead-reverse)" marker-end="url(#arrowhead)"/><text x="136" y="438" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">graphql-ws: connection_init {payload: {Authorization: &quot;Bearer ey...&quot;}}</text><text x="554" y="460" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">connection_ack {payload: {connectionTimeoutMs: 30000}}</text><line x1="128" y1="524" x2="544" y2="524" stroke="#b4f079" stroke-width="1.5" marker-start="url(#arrowhead-reverse)" marker-end="url(#arrowhead)"/><text x="136" y="516" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">ping frame (opcode 0x9) / pong frame (opcode 0xA)</text><text x="554" y="538" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Bidirectional heartbeat</text><line x1="544" y1="564" x2="960" y2="564" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="556" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Touch last_active timestamp</text><line x1="128" y1="658" x2="544" y2="658" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="650" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Close frame: code=1000, reason=&quot;Normal closure&quot;</text><text x="554" y="672" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Graceful shutdown initiated</text><line x1="544" y1="698" x2="960" y2="698" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="690" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Delete WS session and publish disconnect event to pubsub channel</text><line x1="544" y1="732" x2="128" y2="732" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="724" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Close frame: code=1000 acknowledged</text><text x="554" y="746" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">TCP connection teardown</text></g><g class="notes"><text x="20" y="800" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ffffff" text-anchor="start" dominant-baseline="central">Full-duplex communication established with automatic reconnect on abnormal closure</text></g><g class="participants"><rect x="79" y="50" width="98" height="42" rx="12" fill="transparent" stroke="#b4f079" stroke-width="1.5"/><text x="128" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">BROWSER</text><rect x="259" y="50" width="154" height="42" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="336" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">LOAD BALANCER</text><rect x="448" y="50" width="192" height="42" rx="12" fill="url(#hero)" stroke="#b4f079" stroke-width="1.5"/><text x="544" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">WEBSOCKET GATEWAY</text><rect x="679.5" y="50" width="145" height="42" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="752" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">AUTH SERVICE</text><rect x="883" y="50" width="154" height="42" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="960" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">SESSION STORE</text><rect x="79" y="856" width="98" height="42" rx="12" fill="transparent" stroke="#b4f079" stroke-width="1.5"/><text x="128" y="877" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">BROWSER</text><rect x="259" y="856" width="154" height="42" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="336" y="877" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">LOAD BALANCER</text><rect x="448" y="856" width="192" height="42" rx="12" fill="url(#hero)" stroke="#b4f079" stroke-width="1.5"/><text x="544" y="877" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">WEBSOCKET GATEWAY</text><rect x="679.5" y="856" width="145" height="42" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="752" y="877" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">AUTH SERVICE</text><rect x="883" y="856" width="154" height="42" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="960" y="877" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">SESSION STORE</text></g>
