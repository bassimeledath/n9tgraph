<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 581.24 676" width="581.24" height="676">
<defs>
  <pattern id="dotgrid" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#000000"/>
    <circle cx="4" cy="4" r="0.8" fill="#b4f079" opacity="0.7"/>
  </pattern>
  <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#000000"/>
    <path d="M0 8L8 0M-1 1L1 -1M7 9L9 7" stroke="#b4f079" stroke-width="0.8" opacity="0.2"/>
  </pattern>
  <pattern id="hero" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="#3d6b23"/>
    <circle cx="3" cy="3" r="0.6" fill="#5a9a35" opacity="0.5"/>
  </pattern>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
    <polygon points="0 0, 10 3.5, 0 7" fill="#b4f079"/>
  </marker>
  <marker id="arrowhead-reverse" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
    <polygon points="10 0, 0 3.5, 10 7" fill="#b4f079"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#000000"/>
<g class="diagram">
<text x="30" y="34" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="600">Streaming shell command output</text><g class="lifelines"><line x1="126.5" y1="118" x2="126.5" y2="598" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="346.5" y1="118" x2="346.5" y2="598" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/></g><g class="fragments"></g><g class="messages"><line x1="126.5" y1="142" x2="346.5" y2="142" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="134.5" y="134" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">START COMMAND</tspan></text><text x="356.5" y="156" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Launch process</text><text x="356.5" y="196" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Collect output for N seconds</text><line x1="346.5" y1="222" x2="126.5" y2="222" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="134.5" y="214" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">CHUNK #1</tspan></text><text x="356.5" y="236" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(running or done)</text><line x1="126.5" y1="276" x2="346.5" y2="276" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="134.5" y="268" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">FOLLOW-UP REQUEST</tspan></text><text x="356.5" y="290" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(same live session)</text><text x="356.5" y="330" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Apply input (if any)</text><text x="356.5" y="356" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Collect output for N seconds</text><line x1="346.5" y1="382" x2="126.5" y2="382" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="134.5" y="374" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">CHUNK #2</tspan></text><line x1="346.5" y1="426" x2="126.5" y2="426" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="134.5" y="418" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">... repeat until completed ...</text><line x1="346.5" y1="470" x2="126.5" y2="470" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="134.5" y="462" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">FINAL CHUNK</tspan></text><text x="356.5" y="484" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(completed)</text><line x1="346.5" y1="524" x2="126.5" y2="524" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="134.5" y="516" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Session cleaned up</text></g><g class="notes"></g><g class="participants"><rect x="79" y="70" width="95" height="48" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="126.5" y="94" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="280" y="70" width="133" height="48" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="346.5" y="94" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text><rect x="79" y="598" width="95" height="48" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="126.5" y="622" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="280" y="598" width="133" height="48" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="346.5" y="622" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text></g>
</g>
</svg>