-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ffffff" text-anchor="middle" dominant-baseline="central">**4**  Data processing</text><rect x="28.700000000000003" y="654" width="195.6" height="32" rx="4" fill="#111111" stroke="#333333" stroke-width="1"/><text x="126.5" y="670" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ffffff" text-anchor="middle" dominant-baseline="central">**5**  Artifact generation</text></g><g class="participants"><rect x="79" y="70" width="95" height="48" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="126.5" y="94" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="280" y="70" width="133" height="48" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="346.5" y="94" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text><rect x="523.5" y="70" width="86" height="48" rx="12" fill="transparent" stroke="#b4f079" stroke-width="1.5"/><text x="566.5" y="94" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">USER</text><rect x="79" y="792" width="95" height="48" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="126.5" y="816" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="280" y="792" width="133" height="48" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/>