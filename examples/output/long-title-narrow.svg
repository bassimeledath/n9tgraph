<rect x="298" y="161" width="125" height="80" rx="12" fill="url(#hero)" stroke="#b4f079" stroke-width="1.5"/><rect x="316.5" y="181.9" width="88" height="22.2" fill="#000000" rx="2"/><text x="360.5" y="193" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">EVENT BUS</text><rect x="332.5" y="202.3" width="56" height="21.4" fill="#000000" rx="2"/><text x="360.5" y="213" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" opacity="0.6" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">Kafka</text>
