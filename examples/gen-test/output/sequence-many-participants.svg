<rect width="100%" height="100%" fill="#000000"/>
<g class="diagram">
<text x="30" y="34" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">OAuth 2.0 authorization code flow with PKCE and token refresh</text><g class="lifelines"><line x1="128" y1="92" x2="128" y2="1238" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="336" y1="92" x2="336" y2="1238" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="544" y1="92" x2="544" y2="1238" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="752" y1="92" x2="752" y2="1238" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="960" y1="92" x2="960" y2="1238" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="1168" y1="92" x2="1168" y2="1238" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="1376" y1="92" x2="1376" y2="1238" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/></g><g class="fragments"><rect x="89.5" y="946" width="1325" height="220" rx="4" fill="none" stroke="#b4f079" stroke-width="1"/><rect x="89.5" y="946" width="48" height="22" fill="#b4f079" rx="2"/><text x="97.5" y="957" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#000000" dominant-baseline="central" font-weight="700" letter-spacing="0.08em">LOOP</text><text x="147.5" y="957" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" dominant-baseline="central" letter-spacing="0.08em">TOKEN REFRESH (every 15 min)</text></g><g class="messages"><line x1="128" y1="116" x2="336" y2="116" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="108" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">GET /authorize</text><text x="346" y="130" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">code_challenge + redirect_uri</text><line x1="336" y1="156" x2="544" y2="156" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="148" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Validate client_id + redirect_uri</text><line x1="544" y1="190" x2="960" y2="190" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="182" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Lookup client registration</text><line x1="960" y1="224" x2="544" y2="224" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="216" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Client metadata</text><line x1="544" y1="258" x2="336" y2="258" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="250" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Client validated</text><line x1="336" y1="292" x2="128" y2="292" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="284" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">302 Redirect to login page</text><line x1="128" y1="326" x2="336" y2="326" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="318" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">POST /login</text><text x="346" y="340" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">username + password</text><line x1="336" y1="366" x2="544" y2="366" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="358" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Authenticate credentials</text><line x1="544" y1="400" x2="960" y2="400" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="392" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Verify password hash</text><line x1="960" y1="434" x2="544" y2="434" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="426" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Auth result</text><line x1="544" y1="468" x2="336" y2="468" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="460" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Authentication success</text><line x1="336" y1="502" x2="1376" y2="502" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="494" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Log successful login</text><line x1="336" y1="536" x2="128" y2="536" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="528" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">302 Redirect with authorization code</text><line x1="128" y1="570" x2="336" y2="570" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="562" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">POST /token</text><text x="346" y="584" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">code + code_verifier</text><line x1="336" y1="610" x2="752" y2="610" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="602" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Exchange code for tokens</text><line x1="752" y1="644" x2="544" y2="644" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="636" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Validate code + verify PKCE</text><line x1="544" y1="678" x2="752" y2="678" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="670" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Verified</text><line x1="752" y1="712" x2="336" y2="712" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="704" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">access_token + refresh_token + id_token</text><line x1="336" y1="746" x2="1376" y2="746" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="738" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Log token issuance</text><line x1="336" y1="780" x2="128" y2="780" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="772" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">200 Token response</text><line x1="128" y1="814" x2="1168" y2="814" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="806" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">GET /api/data</text><text x="1178" y="828" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Bearer access_token</text><line x1="1168" y1="854" x2="752" y2="854" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="760" y="846" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Introspect token</text><line x1="752" y1="888" x2="1168" y2="888" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="760" y="880" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Token valid + scopes</text><line x1="1168" y1="922" x2="128" y2="922" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="914" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">200 Protected resource</text><line x1="128" y1="978" x2="336" y2="978" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="970" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">POST /token</text><text x="346" y="992" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">grant_type=refresh_token</text><line x1="336" y1="1018" x2="752" y2="1018" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="1010" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Rotate refresh token</text><line x1="752" y1="1052" x2="1376" y2="1052" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="760" y="1044" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Log token rotation</text><line x1="752" y1="1086" x2="336" y2="1086" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="1078" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">New token pair</text><line x1="336" y1="1120" x2="128" y2="1120" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="1112" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">200 Refreshed tokens</text></g><g class="notes"><text x="20" y="1182" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ffffff" text-anchor="start" dominant-baseline="central">User session established with automatic token refresh</text></g><g class="participants"><rect x="79" y="50" width="98" height="42" rx="12" fill="transparent" stroke="#b4f079" stroke-width="1.5"/><text x="128" y="71" font-famil