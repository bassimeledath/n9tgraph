="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">302 Redirect to login page</text><line x1="128" y1="452.3745328719723" x2="336" y2="452.3745328719723" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="444.3745328719723" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">POST /login</text><text x="346" y="466.3745328719723" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">username + password</text><line x1="336" y1="513.7148788927336" x2="544" y2="513.7148788927336" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="505.7148788927336" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Authenticate credentials</text><line x1="544" y1="567.3876816608997" x2="960" y2="567.3876816608997" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="559.3876816608997" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Verify password hash</text><line x1="960" y1="621.0604844290657" x2="544" y2="621.0604844290657" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="613.0604844290657" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Auth result</text><line x1="544" y1="674.7332871972318" x2="336" y2="674.7332871972318" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="666.7332871972318" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Authentication success</text><line x1="336" y1="728.4060899653979" x2="1376" y2="728.4060899653979" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="720.4060899653979" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Log successful login</text><line x1="336" y1="782.078892733564" x2="128" y2="782.078892733564" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="774.078892733564" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">302 Redirect with authorization code</text><line x1="128" y1="835.7516955017301" x2="336" y2="835.7516955017301" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="827.7516955017301" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">POST /token</text><text x="346" y="849.7516955017301" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">code + code_verifier</text><line x1="336" y1="897.0920415224914" x2="752" y2="897.0920415224914" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="889.0920415224914" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Exchange code for tokens</text><line x1="752" y1="950.7648442906575" x2="544" y2="950.7648442906575" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="942.7648442906575" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Validate code + verify PKCE</text><line x1="544" y1="1004.4376470588235" x2="752" y2="1004.4376470588235" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="552" y="996.4376470588235" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Verified</text><line x1="752" y1="1058.1104498269897" x2="336" y2="1058.1104498269897" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="1050.1104498269897" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">access_token + refresh_token + id_token</text><line x1="336" y1="1111.7832525951558" x2="1376" y2="1111.7832525951558" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="344" y="1103.7832525951558" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Log token issuance</text><line x1="336" y1="1165.4560553633219" x2="128" y2="1165.4560553633219" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="1157.4560553633219" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">200 Token response</text><line x1="128" y1="1219.128858131488" x2="1168" y2="1219.128858131488" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="136" y="1211.128858131488" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">GET /api/data</text><text x="1178" y="1233.128858131488" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.