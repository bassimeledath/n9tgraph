<rect width="100%" height="100%" fill="#000000"/>
<g class="diagram">
<text x="30" y="34" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Streaming shell command output</text><g class="lifelines"><line x1="90.5" y1="92" x2="90.5" y2="530" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="247.19999999999993" y1="92" x2="247.19999999999993" y2="530" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/></g><g class="fragments"></g><g class="messages"><line x1="90.5" y1="116" x2="247.19999999999993" y2="116" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="98.5" y="108" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">START COMMAND</tspan></text><text x="257.19999999999993" y="130" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Launch process</text><text x="257.19999999999993" y="164" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Collect output for N seconds</text><line x1="247.19999999999993" y1="190" x2="90.5" y2="190" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="98.5" y="182" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">CHUNK #1</tspan></text><text x="257.19999999999993" y="204" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(running or done)</text><line x1="90.5" y1="238" x2="247.19999999999993" y2="238" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="98.5" y="230" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">FOLLOW-UP REQUEST</tspan></text><text x="257.19999999999993" y="252" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(same live session)</text><text x="257.19999999999993" y="286" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Apply input (if any)</text><text x="257.19999999999993" y="312" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Collect output for N seconds</text><line x1="247.19999999999993" y1="338" x2="90.5" y2="338" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="98.5" y="330" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">CHUNK #2</tspan></text><line x1="247.19999999999993" y1="380" x2="90.5" y2="380" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="98.5" y="372" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">... repeat until completed ...</text><line x1="247.19999999999993" y1="422" x2="90.5" y2="422" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="98.5" y="414" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">FINAL CHUNK</tspan></text><text x="257.19999999999993" y="436" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(completed)</text><line x1="247.19999999999993" y1="470" x2="90.5" y2="470" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="98.5" y="462" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Session cleaned up</text></g><g class="notes"></g><g class="participants"><rect x="50.5" y="50" width="80" height="42" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="90.5" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="188.69999999999993" y="50" width="117" height="42" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="247.19999999999993" y="71" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text><rect x="50.5" y="530" width="80" height="42" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="90.5" y="551" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="188.69999999999993" y="530" width="117" height="42" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="247.19999999999993" y="551" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text></g>
