="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.7">guidance on security posture</text><text x="334" y="352" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.7">from now on.</text><rect x="492" y="276" width="190" height="106" rx="10" fill="#111111" stroke="#333333" stroke-width="1"/><g transform="translate(506, 288)"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a5 5 0 014.8 3.6A4 4 0 0120 9.5a4 4 0 01-1.5 7.8A5 5 0 0112 22a5 5 0 01-6.5-4.7A4 4 0 014 9.5a4 4 0 013.2-3.9A5 5 0 0112 2z"/><path d="M12 2v20"/><path d="M8 8h8"/><path d="M7 13h10"/></svg></g><text x="538" y="302" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="600">Tacit knowledge</text><text x="538" y="320" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.7">Ryan is responsible for the</text><text x="538" y="336" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.7">overall architectural</text><text x="538" y="352" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.7">direction of the system.</text><circle cx="698" cy="329" r="3" fill="#ffffff" opacity="0.5"/><circle cx="706" cy="329" r="3" fill="#ffffff" opacity="0.5"/><circle cx="714" cy="329" r="3" fill="#ffffff" opacity="0.5"/>
