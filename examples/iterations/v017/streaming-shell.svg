<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 494.24 559" width="494.24" height="559">
<defs>
  <pattern id="dotgrid" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#000000"/>
    <circle cx="4" cy="4" r="0.8" fill="#b4f079" opacity="0.7"/>
  </pattern>
  <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#000000"/>
    <path d="M0 8L8 0M-1 1L1 -1M7 9L9 7" stroke="#b4f079" stroke-width="0.8" opacity="0.2"/>
  </pattern>
  <pattern id="hero" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="#3d6b23"/>
    <circle cx="3" cy="3" r="0.6" fill="#5a9a35" opacity="0.5"/>
  </pattern>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
    <polygon points="0 0, 10 3.5, 0 7" fill="#b4f079"/>
  </marker>
  <marker id="arrowhead-reverse" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
    <polygon points="10 0, 0 3.5, 10 7" fill="#b4f079"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#000000"/>
<g class="diagram">
<text x="30" y="34" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="600">Streaming shell command output</text><g class="lifelines"><line x1="106.5" y1="104" x2="106.5" y2="493" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/><line x1="261.5" y1="104" x2="261.5" y2="493" stroke="#b4f079" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/></g><g class="fragments"></g><g class="messages"><line x1="106.5" y1="128" x2="261.5" y2="128" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="114.5" y="120" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">START COMMAND</tspan></text><text x="271.5" y="142" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Launch process</text><text x="271.5" y="169" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Collect output for N seconds</text><line x1="261.5" y1="195" x2="106.5" y2="195" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="114.5" y="187" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">CHUNK #1</tspan></text><text x="271.5" y="209" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(running or done)</text><line x1="106.5" y1="236" x2="261.5" y2="236" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="114.5" y="228" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">FOLLOW-UP REQUEST</tspan></text><text x="271.5" y="250" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(same live session)</text><text x="271.5" y="277" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Apply input (if any)</text><text x="271.5" y="303" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">Collect output for N seconds</text><line x1="261.5" y1="329" x2="106.5" y2="329" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="114.5" y="321" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">CHUNK #2</tspan></text><line x1="261.5" y1="362" x2="106.5" y2="362" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="114.5" y="354" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">... repeat until completed ...</text><line x1="261.5" y1="395" x2="106.5" y2="395" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="114.5" y="387" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em"><tspan font-weight="700">FINAL CHUNK</tspan></text><text x="271.5" y="409" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#b4f079" opacity="0.6">(completed)</text><line x1="261.5" y1="436" x2="106.5" y2="436" stroke="#b4f079" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="114.5" y="428" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#b4f079" text-anchor="start" letter-spacing="0.04em">Session cleaned up</text></g><g class="notes"></g><g class="participants"><rect x="61" y="60" width="91" height="44" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="106.5" y="82" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="197" y="60" width="129" height="44" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="261.5" y="82" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text><rect x="61" y="493" width="91" height="44" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="106.5" y="515" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="197" y="493" width="129" height="44" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="261.5" y="515" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text></g>
</g>
</svg>