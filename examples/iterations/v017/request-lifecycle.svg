e', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ffffff" text-anchor="start" dominant-baseline="central"><tspan font-weight="700">4</tspan><tspan>  Data processing</tspan></text><text x="33.900000000000006" y="604" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ffffff" text-anchor="start" dominant-baseline="central"><tspan font-weight="700">5</tspan><tspan>  Artifact generation</tspan></text></g><g class="participants"><rect x="61" y="60" width="91" height="44" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="106.5" y="82" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="197" y="60" width="129" height="44" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="261.5" y="82" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">CONTAINER</text><rect x="375.5" y="60" width="82" height="44" rx="12" fill="transparent" stroke="#b4f079" stroke-width="1.5"/><text x="416.5" y="82" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">USER</text><rect x="61" y="707" width="91" height="44" rx="12" fill="url(#dotgrid)" stroke="#b4f079" stroke-width="1.5"/><text x="106.5" y="729" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="13" fill="#b4f079" text-anchor="middle" dominant-baseline="central" letter-spacing="0.12em">MODEL</text><rect x="197" y="707" width="129" height="44" rx="12" fill="url(#crosshatch)" stroke="#b4f079" stroke-width="1.5"/><text x="261.5" y="729" font-family="'JetBrains Mono', 'F